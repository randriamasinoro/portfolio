name: Deploy

on:
  push:
    branches: [main]

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit — vulnérabilités production uniquement
        run: npm audit --omit=dev --audit-level=high

      - name: Trivy — scan CVE sur le code source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  deploy:
    name: Deploy to VPS
    needs: security
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/portfolio
            git pull origin main
            sudo docker compose build
            sudo docker compose up -d
            sudo docker image prune -f

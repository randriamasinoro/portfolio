name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/portfolio
            git pull origin main
            docker compose build
            docker compose up -d
            docker image prune -f
